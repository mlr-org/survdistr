url: https://survdistr.mlr-org.com
template:
  bootstrap: 5
  light-switch: true
  math-rendering: mathjax

toc:
  depth: 3

navbar:
  structure:
    right: [search, github, lightswitch]
  components:
    github:
      icon: fab fa-github
      href: https://github.com/mlr-org/survdistr
      aria-label: GitHub

reference:
- title: Survival Prediction Class
  contents:
    - survDistr
    - as_survDistr
- title: Interpolation
  contents:
    - contains("interp")
- title: Helper Functions
  contents:
    - title: Transformations
      contents:
        - starts_with("convert_to")

    - title: Assertions
      contents:
        - starts_with("assert")

    - title: Remove Adjacent Duplicates
      contents:
        - trim_duplicates
